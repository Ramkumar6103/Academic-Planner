<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Planner & Timetable Generator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e3f0ff 0%, #f8fbff 100%);
            color: #1a237e;
        }
        .navbar {
            background-color: #1a237e;
        }
        .navbar-brand, .nav-link, .navbar-nav .nav-link.active {
            color: #fff !important;
        }
        .nav-link:hover {
            color: #90caf9 !important;
        }
        .hero-section {
            background: linear-gradient(120deg, #1976d2 60%, #1a237e 100%);
            color: #fff;
            padding: 80px 0 60px 0;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 8px 32px rgba(26,35,126,0.08);
        }
        .hero-title {
            font-size: 2.8rem;
            font-weight: 700;
        }
        .hero-tagline {
            font-size: 1.25rem;
            margin-bottom: 32px;
        }
        .btn-academic {
            background: #fff;
            color: #1976d2;
            border-radius: 30px;
            font-weight: 600;
            padding: 12px 32px;
            margin-right: 16px;
            box-shadow: 0 2px 8px rgba(25,118,210,0.08);
            transition: background 0.2s, color 0.2s;
        }
        .btn-academic:hover {
            background: #90caf9;
            color: #fff;
        }
        .btn-outline-academic {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 30px;
            font-weight: 600;
            padding: 12px 32px;
            transition: background 0.2s, color 0.2s;
        }
        .btn-outline-academic:hover {
            background: #fff;
            color: #1976d2;
        }
        .hero-illustration {
            max-width: 100%;
            height: 260px;
            object-fit: contain;
        }
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2rem;
            }
            .hero-section {
                padding: 48px 0 32px 0;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-calendar-days me-2"></i>Academic Planner</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#features">Features</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#login">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section text-center">
        <div class="container">
            <div class="row align-items-center justify-content-center">
                <div class="col-lg-7 mx-auto">
                    <h1 class="hero-title mb-3">Academic Planner & Timetable Generator</h1>
                    <p class="hero-tagline mb-4">Organize your academic life, generate smart timetables, and stay ahead with ease.</p>
                    <a href="#login" class="btn btn-academic me-2">Login</a>
                    <a href="#features" class="btn btn-outline-academic">Learn More</a>
                </div>
            </div>
            <div class="row justify-content-center mt-5">
                <div class="col-md-7">
                    <img src="https://cdn.pixabay.com/photo/2017/01/31/13/14/calendar-2025844_1280.png" alt="Academic Planning Illustration" class="hero-illustration shadow-sm rounded-4 bg-white p-3">
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
